services:
  nexusgov-ia:
    build: .
    container_name: nexusgov-ia
    ports:
      - "8001:8001"
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
      OLLAMA_EMBED_BASE_URL: ${OLLAMA_EMBED_BASE_URL:-http://localhost:11434}
      OLLAMA_EMBED_API_KEY: ${OLLAMA_EMBED_API_KEY:-}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_GERAL: ${S3_BUCKET_GERAL:-br.com.sofintech.nexusgov.geral}
      INGEST_ENABLED: ${INGEST_ENABLED:-true}
      INGEST_POLL_SECONDS: ${INGEST_POLL_SECONDS:-30}
      OCR_LANG: ${OCR_LANG:-por}
      DOC_CHAT_TOP_K: ${DOC_CHAT_TOP_K:-6}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://45.79.207.184:8082/realms/nexusgov}
      JWT_ALGORITHMS: ${JWT_ALGORITHMS:-RS256}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SESSION_BACKEND: ${SESSION_BACKEND:-memory}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379/0}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-20}
      APP_PORT: ${APP_PORT:-8000}
      APP_HOST: ${APP_HOST:-0.0.0.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nexusgov-net

networks:
  nexusgov-net:
    external: true
