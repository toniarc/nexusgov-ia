services:
  nexusgov-ia:
    build: .
    container_name: nexusgov-ia
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nexusgov-net

networks:
  nexusgov-net:
    external: true
