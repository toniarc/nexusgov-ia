[pytest]
testpaths = tests
addopts = -ra --strict-markers
markers =
    integration: testes de integração (requerem banco/serviços reais)
    unit: testes unitários (sem dependências externas)
# Variáveis sensíveis devem vir de .env.test (gitignored) carregado via pytest-dotenv,
# OU exportadas no shell antes de rodar `pytest`. Nunca commite credenciais aqui.
